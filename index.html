<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Date Invite</title>
<style>
body{font-family:Arial;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#ffd6e7;overflow:hidden}
.card{background:#fff;padding:24px;border-radius:18px;text-align:center;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
button{padding:10px 18px;margin:8px;border:none;border-radius:20px;font-size:16px;cursor:pointer}
#yes{background:#4caf50;color:#fff}#no{background:#f44336;color:#fff;position:relative}
.step{display:none}.show{display:block}
</style></head><body>
<div class="card">
<div id="s1" class="step show">
<h2>Sathi ❤️</h2><p>Would you like to go on a date with me?</p>
<button id="yes">Yes</button><button id="no">No</button></div>
<div id="s2" class="step">
<h3>Select Date</h3><input type="date" id="date"><br><br>
<h3>Select Time</h3><input type="time" id="time"><br><br>
<h3>Choose Treat</h3>
<select id="food" multiple size="6">
<option>Pizza 🍕</option><option>Burger 🍔</option><option>Momos 🥟</option><option>Coffee ☕</option><option>Tea 🍵</option><option>Other</option>
</select><br><br>
<button onclick="finish()">Confirm</button>
</div>
<div id="s3" class="step"><h2>🎉 Date Confirmed!</h2><p id="out"></p></div>
</div>
<script>
const no=document.getElementById('no');
no.onmouseover=()=>{no.style.left=(Math.random()*180-90)+'px';no.style.top=(Math.random()*120-60)+'px';}
yes.onclick=()=>{s1.classList.remove('show');s2.classList.add('show');}
function finish(){
let foods=[...food.selectedOptions].map(o=>o.text).join(", ");
out.innerHTML=`📅 ${date.value}<br>🕒 ${time.value}<br>🍽️ ${foods}<br><br>See you soon, Sathi ❤️`;
s2.classList.remove('show');s3.classList.add('show');
}
</script></body></html>
